<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário</title>
    <link rel="stylesheet" href="/static/primeiro_acesso.css">
</head>
<body>



<div class="container">
    <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>
    <form method="POST">

      <h2>Editar Usuário</h2>
        <label>Nome</label>
        <input type="text" name="nome" value="{{ usuario.nome }}" required>

        <label>E-mail</label>
        <input type="email" name="email" value="{{ usuario.email }}" required>

        <label>Idade</label>
        <input type="number" name="idade" value="{{ usuario.idade }}" required>

        <label>Nova Senha (opcional)</label>
        <input type="password" name="senha" placeholder="Deixe em branco para manter a atual">

        <div class="botoes">
            <button type="submit" class="btn-salvar">Salvar Alterações</button>
            <a href="{{ url_for('usuario.listar_usuarios') }}" class="btn-voltar">Cancelar</a>
        </div>

    </form>
</div>

</body>
</html>
