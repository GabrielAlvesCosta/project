<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form action="{{ url_for('auth.login') }}" method="POST">

                  {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf_login" name="cpf" maxlength="14" placeholder="000.000.000-00" value="{{ (campos|default({})).get('cpf', '') }}" required>
            <label for="senha">Senha</label>
            <div class="password-field">
                <input type="password" id="senha" name="senha" required />
                <span id="toggleSenha" class="toggle-password" title="Mostrar senha">
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"
                         viewBox="0 0 24 24" fill="none"
                         stroke="#374151" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>
            <button type="submit">Entrar</button><br><br>
        
            <a href="{{ url_for('auth.home') }}">Voltar para início</a>
            
        </form>
    </div>

    

     <script>
        const senhaInput = document.getElementById('senha');
        const toggle = document.getElementById('toggleSenha');
        const eyeIcon = toggle.querySelector('svg');

        toggle.addEventListener('click', function () {
            const visible = senhaInput.type === 'text';
            senhaInput.type = visible ? 'password' : 'text';
            eyeIcon.setAttribute('stroke', visible ? '#374151' : '#2563eb');
        });

        const cpfInput = document.getElementById('cpf');

    const inputCpf = document.getElementById('cpf_login');

    inputCpf.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        
        if (value.length > 0) {
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        }
        
        e.target.value = value;
    });

    </script>

</body>
</html>
