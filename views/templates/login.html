<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form action="{{ url_for('auth.login') }}" method="POST">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible" role="alert">
                        <span>{{ message }}</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">&times;</button>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <label for="email">EMAIL:</label>
            <input type="text" id="email" name="email" placeholder="exemplo@email.com" required>
            
            <label for="senha">Senha</label>
            <div class="password-field">
                <input type="password" id="senha" name="senha"/>
                <span id="toggleSenha" class="toggle-password" title="Mostrar senha">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                         viewBox="0 0 24 24" fill="none"
                         stroke="#374151" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>
            
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        const senhaInput = document.getElementById('senha');
        const toggle = document.getElementById('toggleSenha');
        const eyeIcon = toggle.querySelector('svg');

        toggle.addEventListener('click', function () {
            const visible = senhaInput.type === 'text';
            senhaInput.type = visible ? 'password' : 'text';
            eyeIcon.setAttribute('stroke', visible ? '#374151' : '#2563eb');
        });


        document.querySelectorAll('.btn-close').forEach(button => {
            button.addEventListener('click', () => {
                button.closest('.alert').style.display = 'none';
            });
        });
    </script>
</body>
</html>
